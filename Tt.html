    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #ff6b9d;
            --secondary: #c44569;
            --light: #fff5f7;
        }
        body {
            font-family: 'Lato', sans-serif;
            background: var(--light);
            color: #2d3436;
            line-height: 1.6;
        }
        .nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--secondary);
            font-weight: 700;
        }
        .nav-links {
            display: flex;
            gap: 1rem;
            list-style: none;
            font-size: 0.85rem;
        }
        .nav-links a {
            text-decoration: none;
            color: #2d3436;
            font-weight: 600;
        }
        .all-reasons-page {
            padding: 6rem 1.5rem 3rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .all-reasons-page h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            text-align: center;
            color: var(--secondary);
            margin-bottom: 1rem;
        }
        .section-desc {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
        }
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .filter-btn:hover, .filter-btn.active {
            background: var(--primary);
            color: white;
        }
        .reasons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
        }
        .reason-card {
            background: white;
            border-radius: 16px;
            padding: 1.2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
            border-left: 4px solid var(--primary);
        }
        .reason-card:hover {
            transform: translateY(-4px);
        }
        .reason-number {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            opacity: 0.2;
            position: absolute;
            top: 8px;
            right: 12px;
        }
        .reason-text {
            font-size: 1rem;
            padding-right: 2rem;
        }
        .reason-emoji {
            margin-right: 0.5rem;
        }
        .btn {
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            display: inline-block;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: white;
            margin-top: 2rem;
        }
        .footer {
            background: #2d3436;
            color: white;
            text-align: center;
            padding: 1.5rem;
            font-size: 0.9rem;
        }
        @media (max-width: 768px) {
            .nav-links { gap: 0.5rem; font-size: 0.75rem; }
            .filter-btn { padding: 0.4rem 1rem; font-size: 0.8rem; }
        }
    </style>
</head>

        function renderReasons(filter) {
            const grid = document.getElementById('reasonsGrid');
            grid.innerHTML = '';
            const filtered = filter === 'all' ? reasons : reasons.filter(r => r.cat === filter);
            filtered.forEach((reason, idx) => {
                const card = document.createElement('div');
                card.className = 'reason-card';
                card.innerHTML = `
                    <span class="reason-number">${reasons.indexOf(reason) + 1}</span>
                    <span class="reason-emoji">${reason.emoji}</span>
                    <span class="reason-text">${reason.text}</span>
                `;
                grid.appendChild(card);
            });
        }

        function filterReasons(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderReasons(category);
        }
