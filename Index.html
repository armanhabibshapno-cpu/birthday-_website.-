<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Reasons Why I Love You</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #ff6b9d;
            --secondary: #c44569;
            --purple: #764ba2;
            --blue: #667eea;
            --light: #fff5f7;
        }
        body {
            font-family: 'Lato', sans-serif;
            background: var(--light);
            color: #2d3436;
            line-height: 1.6;
        }
        .nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--secondary);
            font-weight: 700;
        }
        .nav-links {
            display: flex;
            gap: 1rem;
            list-style: none;
            font-size: 0.85rem;
        }
        .nav-links a {
            text-decoration: none;
            color: #2d3436;
            font-weight: 600;
        }
        .hero-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            position: relative;
        }
        .hero-page h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 10vw, 5rem);
            margin-bottom: 1rem;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 300;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .birthday-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1.2rem;
            margin-bottom: 2rem;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .btn {
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            display: inline-block;
            margin: 0.5rem;
        }
        .btn-primary {
            background: white;
            color: var(--purple);
        }
        .btn-outline {
            background: transparent;
            color: white;
            border: 2px solid white;
        }
        .float-emoji {
            position: absolute;
            font-size: 2rem;
            animation: float 6s ease-in-out infinite;
            opacity: 0.5;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        @media (max-width: 768px) {
            .nav-links { gap: 0.5rem; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-logo">💝 Our Love</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="letter.html">Letter</a></li>
            <li><a href="categories.html">Categories</a></li>
            <li><a href="all-reasons.html">All 100</a></li>
            <li><a href="memories.html">Memories</a></li>
            <li><a href="final.html">Forever</a></li>
        </ul>
    </nav>
    <section class="hero-page">
        <div class="float-emoji" style="top:15%;left:10%;animation-delay:0s">💖</div>
        <div class="float-emoji" style="top:20%;right:15%;animation-delay:1s">✨</div>
        <div class="float-emoji" style="top:60%;left:5%;animation-delay:2s">🌸</div>
        <div class="float-emoji" style="top:70%;right:10%;animation-delay:3s">💫</div>
        <h1>100 Reasons Why<br>I Love You</h1>
        <p class="subtitle">Every moment with you is a gift I never take for granted</p>
        <div class="birthday-badge">🎂 Happy Birthday, My Love 🎂</div>
        <div>
            <a href="letter.html" class="btn btn-primary">Read My Letter 💌</a>
            <a href="all-reasons.html" class="btn btn-outline">See All 100</a>
        </div>
    </section>
</body>
</html>
